name: Build and Release Hytale Mod

on:
  push:
    branches:
      - prod
      - main
      - alpha

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requis pour créer la release GitHub

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'

    - name: Build Mod with Gradle
      run: gradle build

    - name: Extract Branch Name
      shell: bash
      run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
      id: extract_branch

    - name: Set Release Tag
      id: set_tag
      shell: bash
      run: |
        COMMIT_SHORT=$(git rev-parse --short HEAD)
        DATE=$(date +'%Y.%m.%d')
        BRANCH=${{ steps.extract_branch.outputs.branch }}
        
        # Generation du tag (ex: v2026.03.11-alpha-a1b2c3d)
        if [ "$BRANCH" = "prod" ] || [ "$BRANCH" = "main" ]; then
          echo "tag_name=v${DATE}-prod-${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "is_prerelease=false" >> $GITHUB_OUTPUT
        else
          echo "tag_name=v${DATE}-${BRANCH}-${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "is_prerelease=true" >> $GITHUB_OUTPUT
        fi

    - name: Upload Release to GitHub
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.set_tag.outputs.tag_name }}
        name: ExperienceMod ${{ steps.set_tag.outputs.tag_name }}
        draft: false
        prerelease: ${{ steps.set_tag.outputs.is_prerelease == 'true' }}
        files: build/libs/*.jar
        generate_release_notes: true
