name: Build and Release Hytale Mod

on:
  push:
    branches:
      - prod
      - main
      - alpha

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requis pour créer la release GitHub

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'

    - name: Build Mod with Gradle
      run: |
        rm -f gradle.properties
        gradle build

    - name: Extract Branch Name
      shell: bash
      run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
      id: extract_branch

    - name: Set Release Tag
      id: set_tag
      shell: bash
      run: |
        git fetch --tags
        DATE=$(date +'%Y.%m.%d')
        BRANCH=${{ steps.extract_branch.outputs.branch }}
        
        if [ "$BRANCH" = "prod" ]; then
          PREFIX="v${DATE}."
          IS_PRERELEASE="false"
        elif [ "$BRANCH" = "alpha" ]; then
          PREFIX="v${DATE}-pre-release."
          IS_PRERELEASE="true"
        elif [ "$BRANCH" = "main" ]; then
          PREFIX="v${DATE}-dev."
          IS_PRERELEASE="true"
        else
          PREFIX="v${DATE}-${BRANCH}."
          IS_PRERELEASE="true"
        fi

        # Trouver le dernier tag commençant par ce préfixe pour aujourd'hui
        LAST_TAG=$(git tag -l "${PREFIX}*" --sort=-v:refname | head -n 1)

        if [ -z "$LAST_TAG" ]; then
          NEW_TAG="${PREFIX}1"
        else
          # Extraire le numéro après le préfixe
          INDEX=$(echo "$LAST_TAG" | sed "s/^${PREFIX}//")
          # Vérifier si c'est bien un nombre
          if [[ "$INDEX" =~ ^[0-9]+$ ]]; then
            NEXT_INDEX=$((INDEX + 1))
            NEW_TAG="${PREFIX}${NEXT_INDEX}"
          else
            NEW_TAG="${PREFIX}1"
          fi
        fi

        echo "tag_name=${NEW_TAG}" >> $GITHUB_OUTPUT
        echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT

    - name: Rename JAR file
      shell: bash
      run: |
        TAG=${{ steps.set_tag.outputs.tag_name }}
        # Renomme le premier fichier .jar trouvé dans build/libs
        for file in build/libs/*.jar; do
          mv "$file" "build/libs/OpsOrbis-${TAG}.jar"
          break
        done

    - name: Generate Changelog
      id: changelog
      shell: bash
      run: |
        git fetch --tags --unshallow || git fetch --tags
        LAST_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
        if [ -z "$LAST_TAG" ] || [ "$LAST_TAG" = "${{ steps.set_tag.outputs.tag_name }}" ]; then
          echo "history=$(git log --oneline -n 10)" >> $GITHUB_OUTPUT
        else
          # Utilisation d'un délimiteur pour les messages multilignes
          echo "history<<EOF" >> $GITHUB_OUTPUT
          git log ${LAST_TAG}..HEAD --pretty=format:"* %s (%h)" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi

    - name: Upload Release to GitHub
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.set_tag.outputs.tag_name }}
        name: OpsOrbis ${{ steps.set_tag.outputs.tag_name }}
        body: |
          ## Changelog
          ${{ steps.changelog.outputs.history }}
        draft: false
        prerelease: ${{ steps.set_tag.outputs.is_prerelease == 'true' }}
        files: build/libs/*.jar
        generate_release_notes: false
